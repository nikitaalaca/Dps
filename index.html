<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>RoadAlert</title>
  <meta name="theme-color" content="#0B0C10">
  <!-- Firebase compat -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #050608;
      color: #fff;
      overflow: hidden;
      height: 100vh;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 16px;
    }

    .interactive {
      pointer-events: auto;
    }

    .top-panel {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .location-bar {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .pill {
      flex: 1;
      background: rgba(20, 25, 35, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 100px;
      padding: 0 16px;
      height: 48px;
      display: flex;
      align-items: center;
      font-size: 15px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(20, 25, 35, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #fff;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .icon-btn:active {
      transform: scale(0.92);
    }

    .filters {
      display: flex;
      gap: 8px;
    }

    .filter-btn {
      padding: 8px 16px;
      border-radius: 100px;
      background: rgba(10, 15, 25, 0.7);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.6);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: 0.2s;
    }

    .filter-btn.active {
      background: rgba(255, 255, 255, 0.12);
      color: white;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .dot.blue {
      background: #1A5FFF;
      box-shadow: 0 0 8px #1A5FFF;
    }

    .dot.red {
      background: #FF2A4D;
      box-shadow: 0 0 8px #FF2A4D;
    }

    .bottom-card {
      background: rgba(20, 25, 35, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 8px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
    }

    .col span {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      display: block;
      margin-bottom: 4px;
    }

    .col h3 {
      font-size: 18px;
      font-weight: 600;
    }

    .btn-route {
      width: 100%;
      height: 48px;
      border-radius: 16px;
      background: rgba(26, 95, 255, 0.15);
      border: 1px solid rgba(26, 95, 255, 0.3);
      color: #5C8DFF;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      padding: 8px 16px;
      background: rgba(20, 25, 35, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 100px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.5);
      cursor: pointer;
      transition: 0.2s;
    }

    .nav-item.active {
      color: #1A5FFF;
    }

    .nav-item svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
      opacity: 0.7;
      margin-bottom: 2px;
    }

    .nav-item.active svg {
      opacity: 1;
      filter: drop-shadow(0 0 6px #1A5FFF);
    }

    /* Маркеры */
    .glow-marker {
      width: 40px;
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .shield {
      width: 28px;
      height: 32px;
      background: #0B0E14;
      border: 2px solid;
      border-radius: 6px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .glow-marker.blue .shield {
      border-color: #1A5FFF;
      box-shadow: 0 0 15px #1A5FFF, inset 0 0 10px rgba(26, 95, 255, 0.5);
    }

    .glow-marker.red .shield {
      border-color: #FF2A4D;
      box-shadow: 0 0 15px #FF2A4D, inset 0 0 10px rgba(255, 42, 77, 0.5);
    }

    .user-marker {
      width: 16px;
      height: 16px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 0 15px white;
      border: 4px solid #1A5FFF;
    }

    .toast-container {
      position: fixed;
      top: 80px;
      right: 16px;
      z-index: 3000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      background: rgba(20, 25, 35, 0.9);
      backdrop-filter: blur(20px);
      padding: 10px 16px;
      border-radius: 12px;
      color: white;
      font-size: 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal {
      background: rgba(20, 25, 35, 0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 24px;
      width: 90%;
      max-width: 360px;
      color: white;
    }

    .modal h3 {
      margin-bottom: 16px;
    }

    .modal select,
    .modal input {
      width: 100%;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 10px;
      color: white;
      margin-bottom: 12px;
      outline: none;
    }

    .modal button {
      width: 100%;
      height: 44px;
      border-radius: 12px;
      border: none;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
    }

    .submit-btn {
      background: #1A5FFF;
      color: white;
    }

    .cancel-btn {
      background: rgba(255, 255, 255, 0.1);
      color: white;
    }
  </style>
</head>
<body>
  <div id="map"></div>

  <div class="ui-overlay">
    <div class="top-panel">
      <div class="location-bar interactive">
        <div class="pill">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1A5FFF" stroke-width="2" style="margin-right:8px">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
          <span id="locStatus">Ожидание геолокации...</span>
        </div>
        <div class="icon-btn" onclick="refreshMap()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path>
          </svg>
        </div>
        <div class="icon-btn" onclick="openAddEventModal()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
        </div>
      </div>

      <div class="filters interactive">
        <button class="filter-btn active" onclick="setFilter('all', this)">Все</button>
        <button class="filter-btn" onclick="setFilter('blue', this)"><span class="dot blue"></span>Синие</button>
        <button class="filter-btn" onclick="setFilter('red', this)"><span class="dot red"></span>Красные</button>
      </div>
    </div>

    <div class="bottom-card interactive">
      <div class="row">
        <div class="col"><span>Ближайший экипаж</span><h3 id="crewName">—</h3></div>
        <div class="col"><span>Расстояние</span><h3 id="crewDist">—</h3></div>
        <div class="col"><span>Обновлено</span><h3 id="crewTime">—</h3></div>
      </div>
      <button class="btn-route" onclick="buildRoute()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 20l-5.447-2.724A1 1 0 0 1 3 16.382V5.618a1 1 0 0 1 1.447-.894L9 7l6-3 5.447 2.724A1 1 0 0 1 21 7.618v10.764a1 1 0 0 1-1.447.894L15 17l-6 3z"></path>
        </svg>
        Построить маршрут
      </button>
    </div>

    <div class="nav interactive">
      <div class="nav-item active" data-tab="map">
        <svg viewBox="0 0 24 24"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>
        Карта
      </div>
      <div class="nav-item" data-tab="crews">
        <svg viewBox="0 0 24 24"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM19 17H5v-5h14v5z"/></svg>
        Экипажи
      </div>
      <div class="nav-item" data-tab="favs">
        <svg viewBox="0 0 24 24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>
        Избранное
      </div>
      <div class="nav-item" data-tab="info">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
        Инфо
      </div>
    </div>
  </div>

  <div class="modal-overlay interactive" id="addModal" style="display:none;">
    <div class="modal">
      <h3>Новое событие</h3>
      <select id="eventType">
        <option value="ДПС">ДПС</option>
        <option value="патруль">Патруль</option>
        <option value="ДТП">ДТП</option>
        <option value="перекрытие">Перекрытие</option>
      </select>
      <input type="text" id="eventDesc" placeholder="Краткое описание">
      <button class="submit-btn" onclick="addEvent()">Отправить</button>
      <button class="cancel-btn" onclick="closeAddEventModal()">Отмена</button>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script>
    // ========== FIREBASE КОНФИГ ==========
    const firebaseConfig = {
      apiKey: "AIzaSyAoMntaBJd9YJd9PzrTao0dvl1sPbFYVMI",
      authDomain: "project-3797590376463361850.firebaseapp.com",
      databaseURL: "https://project-3797590376463361850-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "project-3797590376463361850",
      storageBucket: "project-3797590376463361850.firebasestorage.app",
      messagingSenderId: "995163864050",
      appId: "1:995163864050:web:9f98757570e34afff4496b",
      measurementId: "G-J2T96NRLXE"
    };

    // Инициализация Firebase
    try {
      firebase.initializeApp(firebaseConfig);
    } catch (e) {
      console.error('Firebase init error', e);
    }
    const db = firebase.database();

    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let map, userLocation, userMarker, eventsLayer;
    let allEvents = [];
    let currentFilter = 'all';
    let nearestCrew = null;

    const carSvg = `<svg viewBox="0 0 24 24" width="16" height="16" fill="white"><path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11c-.66 0-1.21.42-1.42 1.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.85 7h10.29l1.08 3.11H5.77L6.85 7zM19 17H5v-5h14v5z"/></svg>`;

    // ========== КАРТА ==========
    function initMap() {
      map = L.map('map', {
        zoomControl: false,
        attributionControl: false
      }).setView([53.2007, 45.0046], 12);

      L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        maxZoom: 19
      }).addTo(map);

      eventsLayer = L.layerGroup().addTo(map);

      // Подписка на Firebase в реальном времени
      db.ref('events').on('value', (snapshot) => {
        const data = snapshot.val();
        allEvents = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
        renderMarkers();
      }, (error) => {
        console.error('Firebase read error:', error);
        showToast('Ошибка загрузки событий');
      });

      locateUser();
    }

    // ========== МАРКЕРЫ ==========
    function createIcon(type) {
      const colorClass = (type === 'ДПС' || type === 'патруль') ? 'blue' : 'red';
      return L.divIcon({
        html: `<div class="glow-marker ${colorClass}"><div class="shield">${carSvg}</div></div>`,
        iconSize: [40, 40],
        className: ''
      });
    }

    function renderMarkers() {
      if (!eventsLayer) return;
      eventsLayer.clearLayers();

      const filtered = allEvents.filter(e => {
        if (currentFilter === 'blue') return e.type === 'ДПС' || e.type === 'патруль';
        if (currentFilter === 'red') return e.type === 'ДТП' || e.type === 'перекрытие';
        return true;
      });

      filtered.forEach(e => {
        if (e.latitude && e.longitude) {
          L.marker([e.latitude, e.longitude], { icon: createIcon(e.type) })
            .addTo(eventsLayer)
            .bindPopup(`<b>${e.type}</b><br>${e.description || ''}`);
        }
      });

      updateNearestCrew();
    }

    // ========== ГЕОЛОКАЦИЯ ==========
    function locateUser() {
      if (!navigator.geolocation) {
        document.getElementById('locStatus').textContent = 'Геолокация недоступна';
        return;
      }

      navigator.geolocation.watchPosition(
        pos => {
          userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          document.getElementById('locStatus').textContent = 'Местоположение определено';

          if (!userMarker) {
            userMarker = L.marker([userLocation.lat, userLocation.lng], {
              icon: L.divIcon({
                html: '<div class="user-marker"></div>',
                iconSize: [16, 16],
                className: ''
              })
            }).addTo(map);
          } else {
            userMarker.setLatLng([userLocation.lat, userLocation.lng]);
          }

          if (!map._centered) {
            map.setView([userLocation.lat, userLocation.lng], 13);
            map._centered = true;
          }

          updateNearestCrew();
        },
        err => {
          document.getElementById('locStatus').textContent = 'Нет доступа к геопозиции';
          console.warn(err);
        },
        { enableHighAccuracy: true, maximumAge: 30000, timeout: 10000 }
      );
    }

    // ========== БЛИЖАЙШИЙ ЭКИПАЖ ==========
    function updateNearestCrew() {
      if (!userLocation) return;

      const crews = allEvents.filter(e => e.type === 'ДПС' || e.type === 'патруль');
      if (crews.length === 0) {
        document.getElementById('crewName').textContent = '—';
        document.getElementById('crewDist').textContent = '—';
        document.getElementById('crewTime').textContent = '—';
        nearestCrew = null;
        return;
      }

      let minDist = Infinity, nearest = null;
      crews.forEach(c => {
        const d = haversine(userLocation.lat, userLocation.lng, c.latitude, c.longitude);
        if (d < minDist) { minDist = d; nearest = c; }
      });

      nearestCrew = nearest;
      document.getElementById('crewName').textContent = nearest.type;
      document.getElementById('crewDist').textContent = minDist.toFixed(1) + ' км';
      document.getElementById('crewTime').textContent = 'Сейчас';
    }

    function haversine(lat1, lon1, lat2, lon2) {
      const R = 6371;
      const dLat = (lat2 - lat1) * Math.PI / 180;
      const dLon = (lon2 - lon1) * Math.PI / 180;
      const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
      return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function buildRoute() {
      if (!nearestCrew) {
        showToast('Нет данных для маршрута');
        return;
      }
      window.open(`https://yandex.ru/maps/?rtext=~${nearestCrew.latitude},${nearestCrew.longitude}`, '_blank');
    }

    // ========== ФИЛЬТРЫ (исправлено) ==========
    function setFilter(type, btn) {
      currentFilter = type;
      // Обновляем активную кнопку фильтра
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      // Перерисовываем маркеры
      renderMarkers();

      // Синхронизируем активность в нижней навигации (если нужно)
      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      const activeNav = document.querySelector(`.nav-item[data-tab="${type === 'all' ? 'map' : type === 'blue' ? 'crews' : 'map'}"]`);
      if (activeNav) activeNav.classList.add('active');
    }

    // ========== МОДАЛЬНОЕ ОКНО ==========
    function openAddEventModal() {
      document.getElementById('addModal').style.display = 'flex';
    }

    function closeAddEventModal() {
      document.getElementById('addModal').style.display = 'none';
      document.getElementById('eventDesc').value = '';
    }

    async function addEvent() {
      if (!userLocation) {
        showToast('Сначала определите местоположение');
        return;
      }
      const type = document.getElementById('eventType').value;
      const desc = document.getElementById('eventDesc').value.trim();
      try {
        await db.ref('events').push({
          latitude: userLocation.lat,
          longitude: userLocation.lng,
          type: type,
          description: desc || '',
          timestamp: Date.now()
        });
        showToast('Событие добавлено');
        closeAddEventModal();
      } catch (e) {
        showToast('Ошибка добавления');
        console.error(e);
      }
    }

    // ========== НАВИГАЦИЯ (исправлено) ==========
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        const tab = item.dataset.tab;
        // Убираем активность со всех nav-элементов
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');

        // Применяем соответствующий фильтр
        if (tab === 'crews') {
          setFilter('blue', document.querySelector('.filter-btn[onclick*="blue"]'));
        } else if (tab === 'map') {
          setFilter('all', document.querySelector('.filter-btn[onclick*="all"]'));
        } else if (tab === 'favs') {
          showToast('Избранное — в разработке');
        } else if (tab === 'info') {
          showToast('RoadAlert • Firebase • Реальное время');
        }
      });
    });

    function refreshMap() {
      showToast('Данные обновляются автоматически');
    }

    // ========== УВЕДОМЛЕНИЯ ==========
    function showToast(msg) {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.textContent = msg;
      document.getElementById('toastContainer').appendChild(toast);
      setTimeout(() => toast.remove(), 3000);
    }

    // ========== СТАРТ ==========
    window.addEventListener('DOMContentLoaded', initMap);
  </script>
</body>
</html>
